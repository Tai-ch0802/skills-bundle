name: "🔄 Sync Upstream Skills - vudovn/antigravity-kit"

on:
  schedule:
    # 00:00 UTC+8 = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      hours_lookback:
        description: "Hours to look back for changes (default: 24)"
        required: false
        default: "24"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ----------------------------------------------------------------
      # Phase 1: Detect upstream changes
      # ----------------------------------------------------------------
      - name: 🔍 Detect upstream changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          LOOKBACK_HOURS: ${{ inputs.hours_lookback || '24' }}
        run: |
          set -euo pipefail

          UPSTREAM_REPO="vudovn/antigravity-kit"
          SINCE_DATE=$(date -u -d "${LOOKBACK_HOURS} hours ago" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
                    || date -u -v-${LOOKBACK_HOURS}H '+%Y-%m-%dT%H:%M:%SZ')

          echo "📅 Checking ${UPSTREAM_REPO} for changes since ${SINCE_DATE}"
          echo ""

          # --- Collect recent commits ---
          COMMITS=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
            --jq '.[] | "- [\(.sha[0:7])](https://github.com/'"${UPSTREAM_REPO}"'/commit/\(.sha)) \(.commit.message | split("\n")[0]) (by @\(.author.login // .commit.author.name))"' \
            2>&1 || echo "")

          # --- Collect merged PRs ---
          MERGED_PRS=$(gh api "repos/${UPSTREAM_REPO}/pulls?state=closed&sort=updated&direction=desc&per_page=50" \
            --jq '.[] | select(.merged_at != null) | select(.merged_at >= "'"${SINCE_DATE}"'") | "- PR #\(.number): \(.title) (merged by @\(.merged_by.login // "unknown"))"' \
            2>&1 || echo "")

          # --- Check if any changes found ---
          if [ -z "${COMMITS}" ] && [ -z "${MERGED_PRS}" ]; then
            echo "✅ No changes detected in the last ${LOOKBACK_HOURS} hours. Skipping sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔔 Changes detected!"
          echo ""

          # --- Build change summary ---
          CHANGE_SUMMARY=""

          if [ -n "${COMMITS}" ]; then
            echo "### Recent Commits:"
            echo "${COMMITS}"
            CHANGE_SUMMARY+="## Recent Commits (last ${LOOKBACK_HOURS}h)
          ${COMMITS}

          "
          fi

          if [ -n "${MERGED_PRS}" ]; then
            echo ""
            echo "### Merged PRs:"
            echo "${MERGED_PRS}"
            CHANGE_SUMMARY+="## Merged PRs (last ${LOOKBACK_HOURS}h)
          ${MERGED_PRS}

          "
          fi

          # --- Get list of changed files across all commits ---
          CHANGED_FILES=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
            --jq '.[].sha' 2>&1 | while read -r sha; do
              gh api "repos/${UPSTREAM_REPO}/commits/${sha}" \
                --jq '.files[].filename' 2>&1
            done | sort -u || echo "")

          if [ -n "${CHANGED_FILES}" ]; then
            CHANGE_SUMMARY+="## Changed Files
          ${CHANGED_FILES}
          "
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Store multi-line summary via GITHUB_OUTPUT heredoc delimiter
          cat << 'SUMMARY_EOF' >> "$GITHUB_OUTPUT"
          change_summary<<EOF
          ${CHANGE_SUMMARY}
          EOF
          SUMMARY_EOF

      # ----------------------------------------------------------------
      # Phase 2: Invoke Jules to sync (only if changes detected)
      # ----------------------------------------------------------------
      - name: 🤖 Invoke Jules to sync upstream changes
        if: steps.detect.outputs.has_changes == 'true'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            # Task: Sync Upstream Skill Changes (Metadata & Translations Only)

            You are a skill synchronization agent for the `skills-bundle` project.
            The upstream repository `https://github.com/vudovn/antigravity-kit` has had
            changes in the past 24 hours. Your job is to sync metadata and translations.

            ## ⚠️ IMPORTANT: Remote Download Architecture

            This project uses a **runtime download architecture**. Skills from upstream
            repos are NOT stored locally — they are downloaded at install time via
            `REMOTE_SKILLS` in `bin/install.mjs`. Therefore:

            - Do **NOT** create or modify any root-level skill directories
            - Do **NOT** copy upstream skill files into the repo
            - Only update **installer metadata** and **zh-TW translations**

            ## Upstream Changes Detected

            ${{ steps.detect.outputs.change_summary }}

            ## Skills from this upstream (antigravity-kit)

            api-patterns, app-builder, architecture, bash-linux, behavioral-modes,
            brainstorming, database-design, deployment-procedures, documentation-templates,
            game-development, geo-fundamentals, i18n-localization, intelligent-routing,
            lint-and-validate, mobile-design, nextjs-react-expert,
            nodejs-best-practices, parallel-agents, performance-profiling, plan-writing,
            powershell-windows, python-patterns, red-team-tactics, rust-pro,
            seo-fundamentals, server-management, systematic-debugging, tailwind-patterns,
            vulnerability-scanner, web-design-guidelines

            ## Instructions

            ### Step 1: Identify what changed upstream

            Clone or fetch `https://github.com/vudovn/antigravity-kit` and review the
            changes. Focus on SKILL.md files in the skill directories listed above.

            ### Step 2: Update installer metadata (if needed)

            If any skill's SKILL.md description or name changed, update the corresponding
            entries in `bin/install.mjs`:
            - `LANGUAGES.en.messages.skillDescriptions` (English description)
            - `LANGUAGES['zh-TW'].messages.skillDescriptions` (Traditional Chinese description)

            If upstream added a NEW skill directory:
            1. Add it to the `SKILLS` array (alphabetical order in Antigravity Kit section)
            2. Add to `DEPENDENCIES` (empty array if no dependencies)
            3. Add English + zh-TW descriptions
            4. Add to `REMOTE_SKILLS` with: `{ repo: 'vudovn/antigravity-kit', path: '<name>', branch: 'main' }`

            If upstream deleted a skill, remove it from `SKILLS`, `DEPENDENCIES`,
            `REMOTE_SKILLS`, and both language descriptions.

            ### Step 3: Update zh-TW translations

            For each modified or new skill, update the corresponding file under
            `i18n/zh-TW/<skill-name>/`. Translate the SKILL.md and any reference files
            to Traditional Chinese. Keep the same file structure.

            ### Step 4: Handle composite skills

            If changes affect upstream skills that feed into composite skills:
            - `tdd-workflow` changes → update `testing-mastery/references/tdd-cycle.md`
            - `testing-patterns` changes → update `testing-mastery/references/unit-integration.md`
            - `clean-code` or `code-review-checklist` changes → update `code-quality/SKILL.md`

            Don't forget to update the zh-TW versions of composite skills too.

            ### Step 5: Create PR

            Create a pull request with:
            - **Title**: `sync: update skills from upstream antigravity-kit`
            - **Body**: Include a clear summary of changes

            ## Rules

            - Do NOT create root-level skill directories (they are remote-downloaded)
            - Do NOT modify skills not from this upstream
            - ONLY create a PR if there are actual changes to sync
