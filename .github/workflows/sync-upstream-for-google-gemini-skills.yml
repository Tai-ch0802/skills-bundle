name: "🔄 Sync Upstream Skills - google-gemini/gemini-skills"

on:
  schedule:
    # 00:00 UTC+8 = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      hours_lookback:
        description: "Hours to look back for changes (default: 24)"
        required: false
        default: "24"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ----------------------------------------------------------------
      # Phase 1: Detect upstream changes
      # ----------------------------------------------------------------
      - name: 🔍 Detect upstream changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          LOOKBACK_HOURS: ${{ inputs.hours_lookback || '24' }}
        run: |
          set -euo pipefail

          UPSTREAM_REPO="google-gemini/gemini-skills"
          SINCE_DATE=$(date -u -d "${LOOKBACK_HOURS} hours ago" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
                    || date -u -v-${LOOKBACK_HOURS}H '+%Y-%m-%dT%H:%M:%SZ')

          echo "📅 Checking ${UPSTREAM_REPO} for changes since ${SINCE_DATE}"
          echo ""

          # --- Collect recent commits ---
          COMMITS=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
            --jq '.[] | "- [\(.sha[0:7])](https://github.com/'"${UPSTREAM_REPO}"'/commit/\(.sha)) \(.commit.message | split("\n")[0]) (by @\(.author.login // .commit.author.name))"' \
            2>&1 || echo "")

          # --- Collect merged PRs ---
          MERGED_PRS=$(gh api "repos/${UPSTREAM_REPO}/pulls?state=closed&sort=updated&direction=desc&per_page=50" \
            --jq '.[] | select(.merged_at != null) | select(.merged_at >= "'"${SINCE_DATE}"'") | "- PR #\(.number): \(.title) (merged by @\(.merged_by.login // "unknown"))"' \
            2>&1 || echo "")

          # --- Check if any changes found ---
          if [ -z "${COMMITS}" ] && [ -z "${MERGED_PRS}" ]; then
            echo "✅ No changes detected in the last ${LOOKBACK_HOURS} hours. Skipping sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔔 Changes detected!"
          echo ""

          # --- Build change summary ---
          CHANGE_SUMMARY=""

          if [ -n "${COMMITS}" ]; then
            echo "### Recent Commits:"
            echo "${COMMITS}"
            CHANGE_SUMMARY+="## Recent Commits (last ${LOOKBACK_HOURS}h)
          ${COMMITS}

          "
          fi

          if [ -n "${MERGED_PRS}" ]; then
            echo ""
            echo "### Merged PRs:"
            echo "${MERGED_PRS}"
            CHANGE_SUMMARY+="## Merged PRs (last ${LOOKBACK_HOURS}h)
          ${MERGED_PRS}

          "
          fi

          # --- Get list of changed files across all commits ---
          CHANGED_FILES=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
            --jq '.[].sha' 2>&1 | while read -r sha; do
              gh api "repos/${UPSTREAM_REPO}/commits/${sha}" \
                --jq '.files[].filename' 2>&1
            done | sort -u || echo "")

          if [ -n "${CHANGED_FILES}" ]; then
            CHANGE_SUMMARY+="## Changed Files
          ${CHANGED_FILES}
          "
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Store multi-line summary via GITHUB_OUTPUT heredoc delimiter
          cat << 'SUMMARY_EOF' >> "$GITHUB_OUTPUT"
          change_summary<<EOF
          ${CHANGE_SUMMARY}
          EOF
          SUMMARY_EOF

      # ----------------------------------------------------------------
      # Phase 2: Invoke Jules via REST API (only if changes detected)
      # ----------------------------------------------------------------
      - name: 🤖 Invoke Jules to sync upstream changes
        if: steps.detect.outputs.has_changes == 'true'
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          CHANGE_SUMMARY: ${{ steps.detect.outputs.change_summary }}
        run: |
          set -euo pipefail

          JULES_BASE="https://jules.googleapis.com/v1alpha"
          SOURCE_NAME="sources/github-Tai-ch0802-skills-bundle"

          # --- Build the prompt ---
          PROMPT=$(cat <<'PROMPT_EOF'
          # Task: Sync Upstream Skill Changes (Metadata & Translations Only)

          You are a skill synchronization agent for the `skills-bundle` project.
          The upstream repository `https://github.com/google-gemini/gemini-skills` has had
          changes in the past 24 hours. Your job is to sync metadata and translations.

          ## ⚠️ IMPORTANT: Remote Download Architecture

          This project uses a **runtime download architecture**. ALL skills from
          upstream repos are downloaded at install time via `REMOTE_SKILLS` in
          `bin/install.mjs`. Therefore:

          - Do **NOT** create or modify any root-level skill directories
          - Do **NOT** copy upstream skill files into the repo
          - Only update **installer metadata** and **zh-TW translations**

          ## Upstream Changes Detected

          PROMPT_EOF
          )
          PROMPT+="${CHANGE_SUMMARY}"
          PROMPT+=$(cat <<'PROMPT_EOF'

          ## Important: Upstream Directory Structure

          The upstream repo nests skills under `skills/<skill-name>/`, NOT at root level.

          ## Skills from this upstream (gemini-skills)

          All are REMOTE (downloaded at runtime):
          gemini-api-dev, gemini-interactions-api, gemini-live-api-dev

          ## Instructions

          ### Step 1: Identify what changed upstream

          Clone or fetch `https://github.com/google-gemini/gemini-skills` and review
          the changes under `skills/` directories.

          ### Step 2: Update installer metadata (if needed)

          If any skill's SKILL.md description or name changed, update the corresponding
          entries in `bin/install.mjs`:
          - `LANGUAGES.en.messages.skillDescriptions` (English description)
          - `LANGUAGES['zh-TW'].messages.skillDescriptions` (Traditional Chinese description)

          If upstream added a NEW skill directory under `skills/`:
          1. Add it to the `SKILLS` array (alphabetical order)
          2. Add to `DEPENDENCIES` (empty array if no dependencies)
          3. Add English + zh-TW descriptions
          4. Add to `REMOTE_SKILLS` with: `{ repo: 'google-gemini/gemini-skills', path: 'skills/<name>', branch: 'main' }`

          If upstream deleted a skill, remove it from `SKILLS`, `DEPENDENCIES`,
          `REMOTE_SKILLS`, and both language descriptions.

          ### Step 3: Update zh-TW translations

          For each modified or new skill, update the corresponding file under
          `i18n/zh-TW/<skill-name>/`. Translate the SKILL.md to Traditional Chinese.
          Keep the same YAML frontmatter structure.

          ### Step 4: Update README.md

          If new skills were added or existing skills removed:
          1. Update the skill count
          2. Update the Gemini API Skills section
          3. Update GEMINI.md if needed

          ### Step 5: Create PR

          Create a pull request with:
          - **Title**: `sync: update skills from upstream gemini-skills`
          - **Body**: Include a clear summary of changes

          ## Rules

          - Do NOT create root-level skill directories (ALL skills are remote-downloaded)
          - Do NOT modify skills not from this upstream
          - ONLY create a PR if there are actual changes to sync
          PROMPT_EOF
          )

          # --- Escape prompt for JSON ---
          PROMPT_JSON=$(echo "$PROMPT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          # --- Create Jules session ---
          echo "🚀 Creating Jules session..."
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-goog-api-key: ${JULES_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"prompt\": ${PROMPT_JSON},
              \"title\": \"sync: update skills from upstream gemini-skills\",
              \"sourceContext\": {
                \"source\": \"${SOURCE_NAME}\",
                \"githubRepoContext\": {
                  \"startingBranch\": \"main\"
                }
              },
              \"automationMode\": \"AUTO_CREATE_PR\"
            }" \
            "${JULES_BASE}/sessions")

          HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Failed to create Jules session (HTTP ${HTTP_CODE}):"
            echo "$RESPONSE_BODY"
            exit 1
          fi

          SESSION_NAME=$(echo "$RESPONSE_BODY" | python3 -c 'import sys,json; print(json.loads(sys.stdin.read())["name"])')
          SESSION_URL=$(echo "$RESPONSE_BODY" | python3 -c 'import sys,json; print(json.loads(sys.stdin.read()).get("url","N/A"))')

          echo "✅ Jules session created: ${SESSION_NAME}"
          echo "🔗 Session URL: ${SESSION_URL}"

          # --- Poll session state ---
          echo ""
          echo "⏳ Waiting for Jules to complete..."
          MAX_WAIT=1800  # 30 minutes
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            STATE_RESPONSE=$(curl -s \
              -H "x-goog-api-key: ${JULES_API_KEY}" \
              "${JULES_BASE}/${SESSION_NAME}")

            STATE=$(echo "$STATE_RESPONSE" | python3 -c 'import sys,json; print(json.loads(sys.stdin.read()).get("state","UNKNOWN"))')

            echo "  [${ELAPSED}s] State: ${STATE}"

            case "$STATE" in
              COMPLETED)
                echo ""
                echo "🎉 Jules session completed successfully!"
                # Extract PR URL if available
                PR_URL=$(echo "$STATE_RESPONSE" | python3 -c '
          import sys, json
          data = json.loads(sys.stdin.read())
          outputs = data.get("outputs", {})
          prs = outputs.get("pullRequests", [])
          if prs:
              print(prs[0].get("url", "N/A"))
          else:
              print("No PR created")
          ' 2>/dev/null || echo "N/A")
                echo "📝 Pull Request: ${PR_URL}"
                exit 0
                ;;
              FAILED)
                echo ""
                echo "❌ Jules session failed."
                echo "$STATE_RESPONSE" | python3 -c 'import sys,json; print(json.dumps(json.loads(sys.stdin.read()), indent=2))' 2>/dev/null || echo "$STATE_RESPONSE"
                exit 1
                ;;
              QUEUED|PLANNING|IN_PROGRESS|AWAITING_PLAN_APPROVAL|AWAITING_USER_FEEDBACK|PAUSED)
                # Still processing, continue polling
                ;;
              *)
                echo "⚠️  Unknown state: ${STATE}"
                ;;
            esac
          done

          echo ""
          echo "⏰ Timeout: Jules session did not complete within ${MAX_WAIT}s."
          echo "🔗 Check manually: ${SESSION_URL}"
          exit 1
