name: "🔄 Sync Upstream Skills - ClawHub"

on:
  schedule:
    # 00:00 UTC+8 = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ----------------------------------------------------------------
      # Phase 1: Detect upstream changes via ClawHub API
      # ----------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Detect upstream changes
        id: detect
        run: |
          set -euo pipefail

          CLAWHUB_API_BASE="https://wry-manatee-359.convex.site/api/v1/skills"

          # --- Define ClawHub skills to monitor ---
          CLAWHUB_SKILLS=("humanizer" "skill-vetter")
          UPDATED_SKILLS=()
          CHANGE_SUMMARY=""

          echo "📅 Checking ClawHub skills for updates"
          echo ""

          for SLUG in "${CLAWHUB_SKILLS[@]}"; do
            echo "--- Checking ${SLUG} ---"

            # Fetch current metadata from ClawHub API
            RESPONSE=$(curl -sf "${CLAWHUB_API_BASE}/${SLUG}" 2>&1 || echo "")

            if [ -z "${RESPONSE}" ]; then
              echo "⚠️ Failed to fetch ${SLUG} from ClawHub API. Skipping."
              continue
            fi

            # Extract version and updatedAt from response
            UPSTREAM_VERSION=$(echo "${RESPONSE}" | jq -r '.latestVersion.version // empty')
            UPSTREAM_UPDATED=$(echo "${RESPONSE}" | jq -r '.skill.updatedAt // empty')
            UPSTREAM_CHANGELOG=$(echo "${RESPONSE}" | jq -r '.latestVersion.changelog // "No changelog provided"')

            if [ -z "${UPSTREAM_VERSION}" ]; then
              echo "⚠️ Could not parse ${SLUG} upstream version. Skipping."
              continue
            fi

            echo "  🔄 Upstream version: ${UPSTREAM_VERSION}"

            # Compare with locally tracked version
            LOCAL_VERSION_FILE=".github/.clawhub-${SLUG}-version.txt"
            LOCAL_VERSION=""
            if [ -f "${LOCAL_VERSION_FILE}" ]; then
              LOCAL_VERSION=$(head -1 "${LOCAL_VERSION_FILE}" | tr -d '[:space:]')
            fi

            echo "  📦 Local version: ${LOCAL_VERSION:-'(not tracked)'}"

            if [ "${UPSTREAM_VERSION}" = "${LOCAL_VERSION}" ]; then
              echo "  ✅ No changes for ${SLUG}."
              continue
            fi

            echo "  🔔 Version change detected: ${LOCAL_VERSION:-'(none)'} → ${UPSTREAM_VERSION}"
            UPDATED_SKILLS+=("${SLUG}")

            CHANGE_SUMMARY+="### ${SLUG}
          **Version change:** \`${LOCAL_VERSION:-'(initial)'}\` → \`${UPSTREAM_VERSION}\`
          **Updated at:** $(date -u -d @$((UPSTREAM_UPDATED / 1000)) '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || echo "${UPSTREAM_UPDATED}")
          **Changelog:** ${UPSTREAM_CHANGELOG}

          "
            echo ""
          done

          # --- Check if any changes found ---
          if [ ${#UPDATED_SKILLS[@]} -eq 0 ]; then
            echo ""
            echo "✅ No changes detected for any ClawHub skill. Skipping sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UPDATED_LIST=$(IFS=','; echo "${UPDATED_SKILLS[*]}")
          echo ""
          echo "🔔 Updated skills: ${UPDATED_LIST}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "updated_skills=${UPDATED_LIST}" >> "$GITHUB_OUTPUT"

          FULL_SUMMARY="## ClawHub Skills Update

          ${CHANGE_SUMMARY}"

          # Store multi-line summary via GITHUB_OUTPUT heredoc delimiter
          cat << 'SUMMARY_EOF' >> "$GITHUB_OUTPUT"
          change_summary<<EOF
          ${FULL_SUMMARY}
          EOF
          SUMMARY_EOF

      # ----------------------------------------------------------------
      # Phase 2: Invoke Jules to sync (only if changes detected)
      # ----------------------------------------------------------------
      - name: 🤖 Invoke Jules to sync upstream changes
        if: steps.detect.outputs.has_changes == 'true'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            # Task: Sync Upstream Skill Changes from ClawHub

            You are a skill synchronization agent for the `skills-bundle` project.
            One or more skills on ClawHub have been updated. Your job is to sync
            those changes into this project.

            ## Updated Skills

            The following skills have updates: `${{ steps.detect.outputs.updated_skills }}`

            ## Upstream Changes Detected

            ${{ steps.detect.outputs.change_summary }}

            ## Important: Download Method

            Since ClawHub is NOT a Git repository, you must download skills via their API:

            ```bash
            # For each updated skill:
            SLUG="<skill-slug>"
            curl -L -o /tmp/${SLUG}.zip "https://wry-manatee-359.convex.site/api/v1/download?slug=${SLUG}"
            mkdir -p /tmp/${SLUG} && cd /tmp/${SLUG} && unzip -o /tmp/${SLUG}.zip
            ```

            The zip contains:
            - `SKILL.md` — The main skill file (copy this)
            - `README.md` — The readme (not used in our repo)
            - `_meta.json` — Metadata (not used in our repo)

            ## Skill Registry

            **Skills from ClawHub (may be updated):**
            - humanizer (from @biostartechnology)
            - skill-vetter (from @spclaudehome)

            **Skills NOT from ClawHub (do NOT modify):**
            prd, sa, sdd, refactoring, testing-mastery, code-quality,
            api-patterns, app-builder, architecture, bash-linux,
            behavioral-modes, brainstorming, database-design,
            deployment-procedures, documentation-templates, frontend-design,
            game-development, gemini-api-dev, gemini-interactions-api,
            gemini-live-api-dev, geo-fundamentals, i18n-localization,
            intelligent-routing, lint-and-validate, mcp-builder, mobile-design,
            nextjs-react-expert, nodejs-best-practices, parallel-agents,
            performance-profiling, plan-writing, powershell-windows, python-patterns,
            red-team-tactics, rust-pro, seo-fundamentals, server-management,
            systematic-debugging, tailwind-patterns, vulnerability-scanner,
            web-design-guidelines, pcloud, agent-brain

            ## Instructions

            ### Step 1: Download and compare

            For EACH skill listed in the updated skills above:
            1. Download the latest version from ClawHub using the API
            2. Compare the `SKILL.md` with the current `<slug>/SKILL.md` in this repo

            ### Step 2: Sync changed files

            For each skill that has actual file changes:
            1. Copy the updated `SKILL.md` from the download to `<slug>/SKILL.md`
            2. Update the English description in `bin/install.mjs` if the skill
               summary changed
            3. Update the zh-TW description in `bin/install.mjs` if needed

            ### Step 3: Update zh-TW translations

            For each modified skill, update `i18n/zh-TW/<slug>/SKILL.md` to reflect
            the latest changes. Translate the updated content to Traditional Chinese.

            ### Step 4: Update version tracking files

            For each synced skill, update `.github/.clawhub-<slug>-version.txt`
            to contain the new version number.

            ### Step 5: Create PR

            Create a single pull request with:
            - **Title**: `sync: update ClawHub skills (${{ steps.detect.outputs.updated_skills }})`
            - **Body**: Include a clear summary of:
              - Which skills were updated and their version changes
              - What changes were made to each skill's `SKILL.md`
              - What zh-TW translations were updated

            ## Rules

            - Do NOT modify skills that are NOT from ClawHub
            - ONLY create a PR if there are actual file content changes
            - If after comparing all files are identical, do NOT create a PR
            - All existing tests and lint must pass
            - Keep `bin/install.mjs` consistent with available skill directories
