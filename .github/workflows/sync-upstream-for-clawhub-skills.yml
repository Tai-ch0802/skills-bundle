name: "🔄 Sync Upstream Skills - ClawHub"

on:
  schedule:
    # 01:00 UTC+8 = 17:00 UTC (previous day)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      hours_lookback:
        description: "Hours to look back for changes (default: 24)"
        required: false
        default: "24"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ----------------------------------------------------------------
      # Phase 1: Detect upstream changes
      # ----------------------------------------------------------------
      - name: 🔍 Detect upstream changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          LOOKBACK_HOURS: ${{ inputs.hours_lookback || '24' }}
        run: |
          set -euo pipefail

          # ClawHub sources are multiple repos
          SOURCES=("biostartechnology/clawhub" "spclaudehome/Clawhub")
          SINCE_DATE=$(date -u -d "${LOOKBACK_HOURS} hours ago" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
                    || date -u -v-${LOOKBACK_HOURS}H '+%Y-%m-%dT%H:%M:%SZ')

          echo "📅 Checking ClawHub sources for changes since ${SINCE_DATE}"
          
          CHANGE_SUMMARY=""
          HAS_CHANGES=false
          ALL_COMMITS=""
          ALL_MERGED_PRS=""
          ALL_CHANGED_FILES=""

          for UPSTREAM_REPO in "${SOURCES[@]}"; do
            echo "--- Checking ${UPSTREAM_REPO} ---"
            
            # --- Collect recent commits ---
            COMMITS=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
              --jq '.[] | "- [\(.sha[0:7])](https://github.com/'"${UPSTREAM_REPO}"'/commit/\(.sha)) \(.commit.message | split("\n")[0]) (by @\(.author.login // .commit.author.name))"' \
              2>&1 || echo "")
            
            if [ -n "${COMMITS}" ]; then
              ALL_COMMITS+="### ${UPSTREAM_REPO} Commits:
              ${COMMITS}

              "
              HAS_CHANGES=true
            fi

            # --- Collect merged PRs ---
            MERGED_PRS=$(gh api "repos/${UPSTREAM_REPO}/pulls?state=closed&sort=updated&direction=desc&per_page=50" \
              --jq '.[] | select(.merged_at != null) | select(.merged_at >= "'"${SINCE_DATE}"'") | "- PR #\(.number): \(.title) (merged by @\(.merged_by.login // "unknown"))"' \
              2>&1 || echo "")
            
            if [ -n "${MERGED_PRS}" ]; then
              ALL_MERGED_PRS+="### ${UPSTREAM_REPO} PRs:
              ${MERGED_PRS}

              "
              HAS_CHANGES=true
            fi

            # --- Get list of changed files ---
            CHANGED_FILES=$(gh api "repos/${UPSTREAM_REPO}/commits?since=${SINCE_DATE}&per_page=100" \
              --jq '.[].sha' 2>&1 | while read -r sha; do
                gh api "repos/${UPSTREAM_REPO}/commits/${sha}" \
                  --jq '.files[].filename' 2>&1
              done | sort -u || echo "")
            
            if [ -n "${CHANGED_FILES}" ]; then
              ALL_CHANGED_FILES+="### ${UPSTREAM_REPO} Files:
              ${CHANGED_FILES}

              "
            fi
          done

          # --- Check if any changes found ---
          if [ "$HAS_CHANGES" = false ]; then
            echo "✅ No changes detected in the last ${LOOKBACK_HOURS} hours. Skipping sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔔 Changes detected!"
          
          # Build change summary
          if [ -n "${ALL_COMMITS}" ]; then
            CHANGE_SUMMARY+="## Recent Commits (last ${LOOKBACK_HOURS}h)
            ${ALL_COMMITS}
            "
          fi
          if [ -n "${ALL_MERGED_PRS}" ]; then
            CHANGE_SUMMARY+="## Merged PRs (last ${LOOKBACK_HOURS}h)
            ${ALL_MERGED_PRS}
            "
          fi
          if [ -n "${ALL_CHANGED_FILES}" ]; then
            CHANGE_SUMMARY+="## Changed Files
            ${ALL_CHANGED_FILES}
            "
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Store multi-line summary via GITHUB_OUTPUT heredoc delimiter
          cat << 'SUMMARY_EOF' >> "$GITHUB_OUTPUT"
          change_summary<<EOF
          ${CHANGE_SUMMARY}
          EOF
          SUMMARY_EOF

      # ----------------------------------------------------------------
      # Phase 2: Invoke Jules via REST API (only if changes detected)
      # ----------------------------------------------------------------
      - name: 🤖 Invoke Jules to sync upstream changes
        if: steps.detect.outputs.has_changes == 'true'
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          CHANGE_SUMMARY: ${{ steps.detect.outputs.change_summary }}
        run: |
          set -euo pipefail

          JULES_BASE="https://jules.googleapis.com/v1alpha"
          SOURCE_NAME="sources/github/Tai-ch0802/skills-bundle"

          # --- Build the prompt ---
          PROMPT=$(cat <<'PROMPT_EOF'
          # Task: Sync Upstream Skill Changes from ClawHub

          You are a skill synchronization agent for the `skills-bundle` project.
          One or more skills on ClawHub have been updated. Your job is to sync
          the humanizer and skill-vetter skills.

          ## ⚠️ IMPORTANT: Remote Download Architecture

          This project uses a **runtime download architecture**. However, ClawHub
          skills are currently stored LOCALLY as they are modified from the original
          source or curated.

          - Only update these specific skills: humanizer, skill-vetter
          - Update **installer metadata** and **zh-TW translations**

          ## Upstream Changes Detected

          PROMPT_EOF
          )
          PROMPT+="${CHANGE_SUMMARY}"
          PROMPT+=$(cat <<'PROMPT_EOF'

          ## Upstream Mappings

          - `biostartechnology/clawhub` -> humanizer, skill-vetter
          - `spclaudehome/Clawhub` -> humanizer

          ## Instructions

          ### Step 1: Identify what changed upstream

          Review the changes in the ClawHub repositories and see how they affect
          the local `humanizer/` and `skill-vetter/` skills.

          ### Step 2: Update local skill files

          Apply any relevant code or instruction updates to:
          - `humanizer/SKILL.md`
          - `skill-vetter/SKILL.md`

          ### Step 3: Update installer metadata (if needed)

          If any skill's description changed, update `bin/install.mjs`:
          - `LANGUAGES.en.messages.skillDescriptions`
          - `LANGUAGES['zh-TW'].messages.skillDescriptions`

          ### Step 4: Update zh-TW translations

          For each modified skill, update the corresponding file under `i18n/zh-TW/`.
          Translate the SKILL.md to Traditional Chinese.

          ### Step 5: Update README.md

          If skill details significant changed, update README.md and GEMINI.md.

          ### Step 6: Create PR

          Create a pull request with:
          - **Title**: `sync: update skills from ClawHub`
          - **Body**: Include a clear summary of changes

          ## Rules

          - Do NOT modify skills not from ClawHub
          - ONLY create a PR if there are actual changes to sync
          PROMPT_EOF
          )

          # --- Escape prompt for JSON ---
          PROMPT_JSON=$(echo "$PROMPT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          # --- Create Jules session ---
          echo "🚀 Creating Jules session..."
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-goog-api-key: ${JULES_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"prompt\": ${PROMPT_JSON},
              \"title\": \"sync: update skills from ClawHub\",
              \"sourceContext\": {
                \"source\": \"${SOURCE_NAME}\",
                \"githubRepoContext\": {
                  \"startingBranch\": \"main\"
                }
              },
              \"automationMode\": \"AUTO_CREATE_PR\"
            }" \
            "${JULES_BASE}/sessions")

          HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Failed to create Jules session (HTTP ${HTTP_CODE}):"
            echo "$RESPONSE_BODY"
            exit 1
          fi

          SESSION_NAME=$(echo "$RESPONSE_BODY" | python3 -c 'import sys,json; print(json.loads(sys.stdin.read())["name"])')
          SESSION_URL=$(echo "$RESPONSE_BODY" | python3 -c 'import sys,json; print(json.loads(sys.stdin.read()).get("url","N/A"))')

          echo "✅ Jules session created: ${SESSION_NAME}"
          echo "🔗 Session URL: ${SESSION_URL}"

          # --- Fire and forget ---
          echo ""
          echo "🚀 Fire-and-forget: Jules is processing the request asynchronously."
          exit 0
